<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Notas — Iniciar Sesión</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1E1BD2 0%, #0d0a8c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 700;
            color: #1E1BD2;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #888;
            font-size: 14px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
            color: #333;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #1E1BD2;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #1E1BD2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-login:hover  { background: #1815b0; }
        .btn-login:active { transform: scale(0.98); }

        /* Botón secundario — registrar estudiante */
        .btn-registrar {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: white;
            color: #1E1BD2;
            border: 2px solid #1E1BD2;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }

        .btn-registrar:hover {
            background: #f0f0ff;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 8px;
            color: #ccc;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .error-msg {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            color: #d32f2f;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 18px;
            text-align: center;
        }

        .hint {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="login-card">

        <div class="logo">
            <h1>📊 Control de Notas</h1>
            <p>Sistema de gestión académica</p>
        </div>

        {% if error %}
        <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Ingresa tu usuario"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Ingresa tu contraseña"
                    required
                >
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <div class="divider">o</div>

        <a href="/registrar" class="btn-registrar">➕ Registrar estudiante</a>

        <p class="hint">notas2026 © 2026</p>
    </div>
</body>
</html>
